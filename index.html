<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mubble - Group Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ============================================
           CSS VARIABLES - LIGHT & DARK THEMES
           ============================================ */
        :root {
            /* Light Theme (Default) */
            --bg-cream: #faf8f5;
            --bg-cream-dark: #f5f0e8;
            --text-dark: #4a4a4a;
            --text-muted: #888;
            --accent-pink: #ff6ec7;
            --accent-purple: #8e6cff;
            --accent-blue: #6c9eff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(142, 108, 255, 0.15);
            
            /* Chat Light */
            --chat-bg: linear-gradient(135deg, #fff5f7 0%, #f8f5ff 50%, #f0f8ff 100%);
            --chat-header-bg: rgba(255, 255, 255, 0.95);
            --chat-header-text: #4a4a4a;
            --message-bg: rgba(255, 255, 255, 0.9);
            --message-text: #4a4a4a;
            --input-area-bg: rgba(255, 255, 255, 0.95);
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --bg-cream: #1a1a2e;
            --bg-cream-dark: #16213e;
            --text-dark: #eaeaea;
            --text-muted: #aaa;
            --accent-pink: #ff6ec7;
            --accent-purple: #a88beb;
            --accent-blue: #6c9eff;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(142, 108, 255, 0.3);
            --input-bg: rgba(15, 52, 96, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.3);
            
            /* Chat Dark */
            --chat-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --chat-header-bg: rgba(22, 33, 62, 0.95);
            --chat-header-text: #eaeaea;
            --message-bg: rgba(15, 52, 96, 0.6);
            --message-text: #eaeaea;
            --input-area-bg: rgba(22, 33, 62, 0.95);
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* ============================================
           THEME TOGGLE BUTTON - LOGIN PAGE (TOP RIGHT)
           ============================================ */
        #themeToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Light theme toggle */
        :root #themeToggle {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Dark theme toggle */
        [data-theme="dark"] #themeToggle {
            background: rgba(22, 33, 62, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #themeToggle:hover {
            transform: scale(1.1);
        }

        /* ============================================
           THEME TOGGLE BUTTON - CHAT PAGE (TOP LEFT)
           ============================================ */
        .chat-active #themeToggle {
            top: 12px;
            left: 12px;
            right: auto;
            width: 40px;
            height: 40px;
            font-size: 20px;
            z-index: 101;
        }

        /* ============================================
           ANIMATED BACKGROUND - WORKS ON BOTH THEMES
           ============================================ */
        #loginBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* Light background */
        :root #loginBackground {
            background: linear-gradient(135deg, #fff5f7 0%, #f8f5ff 50%, #f0f8ff 100%);
        }

        /* Dark background */
        [data-theme="dark"] #loginBackground {
            background: linear-gradient(135deg, #2d1b2e 0%, #1f1b3a 50%, #1b2638 100%);
        }

        .mubble-text {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 15px;
            animation: float 8s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        /* Light theme text */
        :root .mubble-text {
            opacity: 0.15;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff, #6c9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(142, 108, 255, 0.3);
        }

        /* Dark theme text */
        [data-theme="dark"] .mubble-text {
            opacity: 0.25;
            background: linear-gradient(45deg, #ff9ad5, #c4b5ff, #9bb5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(196, 181, 255, 0.4);
        }

        .mubble-text:nth-child(1) { animation-delay: 0s; }
        .mubble-text:nth-child(2) { animation-delay: -2s; }
        .mubble-text:nth-child(3) { animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }

        /* Animation stops when chat opens */
        .chat-active #loginBackground {
            display: none;
        }

        /* ============================================
           LOGIN SCREEN - CENTERED
           ============================================ */
        #loginScreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            padding: 40px 35px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            max-height: 85vh;
            overflow-y: auto;
            transition: all 0.5s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Light login screen */
        :root #loginScreen {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px var(--shadow-color), inset 0 0 20px rgba(255, 255, 255, 0.8);
        }

        /* Dark login screen */
        [data-theme="dark"] #loginScreen {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px var(--shadow-color), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* MUBBLE Logo */
        .app-logo {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff, #6c9eff, #ff6ec7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            animation: glitter 3s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }

        .app-logo::after {
            content: 'Mubble';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.8) 50%, transparent 70%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 2s infinite;
            pointer-events: none;
        }

        @keyframes glitter {
            0%, 100% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.2); }
        }

        @keyframes shimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .tagline {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
            transition: color 0.3s;
        }

        /* AUTH TABS */
        #authTabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 14px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .tab-btn.active {
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(142, 108, 255, 0.3);
        }

        .tab-btn.active::before {
            opacity: 1;
        }

        /* FORM INPUTS */
        .auth-form input, .auth-form select {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 15px;
            border: 2px solid rgba(142, 108, 255, 0.15);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-dark);
        }

        .auth-form input:focus, .auth-form select:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(142, 108, 255, 0.2);
        }

        .auth-form input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* BUTTONS */
        #loginBtn, #registerBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff9ad5, #a88beb);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(168, 139, 235, 0.3);
        }

        #loginBtn:hover, #registerBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(168, 139, 235, 0.4);
        }

        #loginBtn:disabled, #registerBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================
           CHAT SCREEN - BOTH THEMES
           ============================================ */
        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: var(--chat-bg);
            transition: background 0.5s ease;
        }

        #chatHeader {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(142, 108, 255, 0.2);
            backdrop-filter: blur(10px);
            background: var(--chat-header-bg);
            color: var(--chat-header-text);
            transition: all 0.3s;
            padding-left: 60px;  /* Space for theme button */
        }

        #chatHeader h2 {
            font-size: 18px;
            font-weight: 600;
        }

        #messagesContainer {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: transparent;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            gap: 8px;
        }

        .username {
            font-weight: 700;
            color: var(--accent-pink);
            font-size: 13px;
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 11px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            display: inline-block;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
            backdrop-filter: blur(5px);
            background: var(--message-bg);
            color: var(--message-text);
            border: 1px solid rgba(142, 108, 255, 0.2);
            transition: all 0.3s;
            position: relative;
        }

        .my-message {
            text-align: right;
        }

        .my-message .username {
            color: var(--accent-purple);
        }

        .my-message .message-bubble {
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
        }

        /* Message Status Indicators */
        .message-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        .my-message .message-status {
            justify-content: flex-end;
        }

        .status-icon {
            font-size: 12px;
        }

        .status-read {
            color: #4fc3f7;
        }

        /* Delete Button */
        .delete-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #e74c3c;
            color: white;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10;
        }

        .message:hover .delete-btn {
            display: flex;
            opacity: 1;
        }

        .my-message .delete-btn {
            right: auto;
            left: -8px;
        }

        /* Typing Indicator */
        #typingIndicator {
            padding: 10px 20px;
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            display: none;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            border-top: 1px solid rgba(142, 108, 255, 0.1);
        }

        .typing-dots {
            display: flex;
            gap: 3px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-purple);
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out both;
        }

        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typingBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        #inputArea {
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            backdrop-filter: blur(10px);
            background: var(--input-area-bg);
            border-top: 2px solid rgba(142, 108, 255, 0.2);
            transition: all 0.3s;
        }

        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid rgba(142, 108, 255, 0.2);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: var(--input-bg);
            color: var(--text-dark);
        }

        #messageInput:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(142, 108, 255, 0.2);
        }

        #sendBtn {
            padding: 14px 24px;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(142, 108, 255, 0.3);
        }

        #sendBtn:hover {
            transform: scale(1.05);
        }

        /* ADMIN PANEL */
        #adminPanel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            display: none;
            flex-direction: column;
            background: var(--chat-bg);
            transition: background 0.3s;
        }

        #adminHeader {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent-pink);
            background: var(--chat-header-bg);
            color: var(--chat-header-text);
            padding-left: 60px;  /* Space for theme button */
        }

        #adminHeader h2 {
            color: var(--accent-pink);
            font-size: 18px;
        }

        #adminBtn {
            position: fixed;
            bottom: 80px;
            right: 15px;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
            padding: 12px 18px;
            border-radius: 25px;
            cursor: pointer;
            z-index: 100;
            display: none;
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 5px 20px rgba(142, 108, 255, 0.4);
        }

        .user-item {
            padding: 15px;
            margin: 10px 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(142, 108, 255, 0.2);
            background: var(--message-bg);
            color: var(--message-text);
            transition: all 0.3s;
        }

        .btn-block { background: #e74c3c; color: white; padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; }
        .btn-unblock { background: #27ae60; color: white; padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; }

        /* SCROLLBAR */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(142, 108, 255, 0.3); border-radius: 3px; }

        /* MOBILE RESPONSIVE */
        @media (max-width: 768px) {
            #themeToggle {
                top: 15px;
                right: 15px;
                width: 45px;
                height: 45px;
                font-size: 20px;
            }

            .chat-active #themeToggle {
                top: 10px;
                left: 10px;
                width: 36px;
                height: 36px;
                font-size: 18px;
            }

            .mubble-text {
                font-size: 70px;
                letter-spacing: 8px;
            }

            #loginScreen {
                padding: 30px 25px;
                width: 92%;
                max-width: 340px;
                max-height: 80vh;
            }

            .app-logo {
                font-size: 40px;
            }

            #chatScreen {
                height: 100vh;
                height: -webkit-fill-available;
            }

            #chatHeader {
                padding-left: 55px;
            }

            #adminHeader {
                padding-left: 55px;
            }
        }

        @supports (-webkit-touch-callout: none) {
            #chatScreen {
                height: -webkit-fill-available;
            }
            
            #loginScreen {
                max-height: 75vh;
            }
        }
    </style>
</head>
<body>

    <!-- THEME TOGGLE BUTTON -->
    <button id="themeToggle" onclick="toggleTheme()" title="Toggle Dark/Light Mode">🌙</button>

    <!-- ANIMATED BACKGROUND -->
    <div id="loginBackground">
        <div class="mubble-text">Mubble</div>
        <div class="mubble-text">Mubble</div>
        <div class="mubble-text">Mubble</div>
    </div>

    <!-- LOGIN SCREEN -->
    <div id="loginScreen">
        <div class="app-logo">Mubble</div>
        <p class="tagline">Connect. Chat. Share.</p>

        <div id="authTabs">
            <button class="tab-btn active" onclick="showTab('login', this)">Login</button>
            <button class="tab-btn" onclick="showTab('register', this)">Register</button>
        </div>

        <div id="loginForm" class="auth-form">
            <input type="text" id="loginUsername" placeholder="Username" maxlength="20" autocomplete="off">
            <input type="password" id="loginPassword" placeholder="Password" autocomplete="off">
            <button id="loginBtn" onclick="loginUser()">Login</button>
        </div>

        <div id="registerForm" class="auth-form" style="display:none;">
            <input type="text" id="regUsername" placeholder="Choose Username" maxlength="20" autocomplete="off">
            <input type="password" id="regPassword" placeholder="Choose Password (min 4 chars)" autocomplete="off">
            <select id="countrySelect">
                <option value="">Select Country</option>
                <option value="Pakistan">🇵🇰 Pakistan</option>
                <option value="India">🇮🇳 India</option>
                <option value="USA">🇺🇸 USA</option>
                <option value="UK">🇬🇧 UK</option>
                <option value="Canada">🇨🇦 Canada</option>
                <option value="Australia">🇦🇺 Australia</option>
                <option value="Germany">🇩🇪 Germany</option>
                <option value="France">🇫🇷 France</option>
                <option value="Turkey">🇹🇷 Turkey</option>
                <option value="UAE">🇦🇪 UAE</option>
                <option value="Saudi Arabia">🇸🇦 Saudi Arabia</option>
                <option value="Bangladesh">🇧🇩 Bangladesh</option>
                <option value="Indonesia">🇮🇩 Indonesia</option>
                <option value="Malaysia">🇲🇾 Malaysia</option>
                <option value="Egypt">🇪🇬 Egypt</option>
                <option value="Nigeria">🇳🇬 Nigeria</option>
                <option value="South Africa">🇿🇦 South Africa</option>
                <option value="Brazil">🇧🇷 Brazil</option>
                <option value="Mexico">🇲🇽 Mexico</option>
                <option value="China">🇨🇳 China</option>
                <option value="Japan">🇯🇵 Japan</option>
                <option value="South Korea">🇰🇷 South Korea</option>
                <option value="Russia">🇷🇺 Russia</option>
                <option value="Italy">🇮🇹 Italy</option>
                <option value="Spain">🇪🇸 Spain</option>
                <option value="Netherlands">🇳🇱 Netherlands</option>
                <option value="Sweden">🇸🇪 Sweden</option>
                <option value="Norway">🇳🇴 Norway</option>
                <option value="Other">🌍 Other</option>
            </select>
            <button id="registerBtn" onclick="registerUser()">Create Account</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div id="adminPanel">
        <div id="adminHeader">
            <h2>🔐 Admin Panel</h2>
            <button onclick="closeAdminPanel()" style="background:linear-gradient(45deg,#ff6ec7,#8e6cff);color:white;border:none;padding:10px 20px;border-radius:10px;cursor:pointer;">✕ Close</button>
        </div>
        <div id="adminContent"></div>
    </div>

    <button id="adminBtn" onclick="openAdminPanel()">⚙️ Admin</button>

    <!-- CHAT SCREEN -->
    <div id="chatScreen">
        <div id="chatHeader">
            <h2>💬 Mubble Chat</h2>
            <span id="onlineCount" style="display: none;">Online: 0</span>
        </div>
        <div id="messagesContainer"></div>
        <div id="typingIndicator">
            <span id="typingText">Someone is typing</span>
            <div class="typing-dots">
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
                <div class="typing-dot"></div>
            </div>
        </div>
        <div id="inputArea">
            <input type="text" id="messageInput" placeholder="Type a message..." maxlength="500">
            <button id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <script>
        // ============================================
        // THEME MANAGEMENT
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('mubble-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('mubble-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const toggle = document.getElementById('themeToggle');
            toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
            toggle.title = theme === 'dark' ? 'Switch to Light Mode' : 'Switch to Dark Mode';
        }

        // Initialize theme on load
        initTheme();

        // ============================================
        // FIREBASE & CHAT CONFIG
        // ============================================
        const countryFlags = {
            'Pakistan': '🇵🇰', 'India': '🇮🇳', 'USA': '🇺🇸', 'UK': '🇬🇧',
            'Canada': '🇨🇦', 'Australia': '🇦🇺', 'Germany': '🇩🇪', 'France': '🇫🇷',
            'Turkey': '🇹🇷', 'UAE': '🇦🇪', 'Saudi Arabia': '🇸🇦', 'Bangladesh': '🇧🇩',
            'Indonesia': '🇮🇩', 'Malaysia': '🇲🇾', 'Egypt': '🇪🇬', 'Nigeria': '🇳🇬',
            'South Africa': '🇿🇦', 'Brazil': '🇧🇷', 'Mexico': '🇲🇽', 'China': '🇨🇳',
            'Japan': '🇯🇵', 'South Korea': '🇰🇷', 'Russia': '🇷🇺', 'Italy': '🇮🇹',
            'Spain': '🇪🇸', 'Netherlands': '🇳🇱', 'Sweden': '🇸🇪', 'Norway': '🇳🇴',
            'Other': '🌍'
        };

        const ADMIN_USERNAME = 'Umar';
        const ADMIN_PASSWORD = '12345';

        firebase.initializeApp({
            apiKey: "AIzaSyCy9SQh4bNk_ufl4MgQnIaBIJKbgtb76LY",
            authDomain: "my-chat-app-2026-59e34.firebaseapp.com",
            projectId: "my-chat-app-2026-59e34",
            storageBucket: "my-chat-app-2026-59e34.firebasestorage.app",
            messagingSenderId: "571790875269",
            appId: "1:571790875269:web:0ba9674e50caebf911a7ec"
        });

        const db = firebase.firestore();
        const auth = firebase.auth();
        
        let currentUser = "", currentCountry = "", isAdmin = false;
        let typingTimeout = null;
        let messagesListener = null;
        let typingListener = null;
        let readReceiptsListener = null;

        auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).catch(()=>{});

        // ============================================
        // UI FUNCTIONS
        // ============================================
        function showTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'login' ? 'none' : 'block';
        }

        async function ensureAuth() {
            if (auth.currentUser) return auth.currentUser;
            const result = await auth.signInAnonymously();
            return result.user;
        }

        // ============================================
        // LOGIN
        // ============================================
        async function loginUser() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) { alert("Fill all fields!"); return; }

            btn.disabled = true;
            btn.textContent = 'Please wait...';

            try {
                await ensureAuth();

                if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                    currentUser = ADMIN_USERNAME;
                    currentCountry = "Pakistan";
                    isAdmin = true;
                    enterChat();
                    return;
                }

                const snap = await db.collection("users").where("username", "==", username).get();

                if (snap.empty) { alert("User not found!"); btn.disabled = false; btn.textContent = 'Login'; return; }

                const data = snap.docs[0].data();
                if (data.password !== password) { alert("Wrong password!"); btn.disabled = false; btn.textContent = 'Login'; return; }
                if (data.isBlocked) { alert("Account blocked!"); btn.disabled = false; btn.textContent = 'Login'; return; }

                currentUser = data.username;
                currentCountry = data.country;
                isAdmin = data.isAdmin || false;
                enterChat();

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        // ============================================
        // REGISTER
        // ============================================
        async function registerUser() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const country = document.getElementById('countrySelect').value;
            const btn = document.getElementById('registerBtn');

            if (!username || !password || !country) { alert("Fill all fields!"); return; }
            if (password.length < 4) { alert("Password too short!"); return; }

            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const existing = await db.collection("users").where("username", "==", username).get();
                if (!existing.empty) { alert("Username taken!"); btn.disabled = false; btn.textContent = 'Create Account'; return; }

                const user = await ensureAuth();

                await db.collection("users").add({
                    username, password, country,
                    flag: countryFlags[country],
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isBlocked: false, isAdmin: false,
                    userId: user.uid
                });

                alert("Account created! Please login.");
                showTab('login', document.querySelectorAll('.tab-btn')[0]);
                document.getElementById('loginUsername').value = username;
                btn.disabled = false;
                btn.textContent = 'Create Account';

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        // ============================================
        // ENTER CHAT
        // ============================================
        function enterChat() {
            document.body.classList.add('chat-active');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('loginBackground').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';
            
            if (isAdmin) document.getElementById('adminBtn').style.display = 'block';

            listenMessages();
            setupInput();
            listenTyping();
            updateReadReceipts();
        }

        function setupInput() {
            const input = document.getElementById('messageInput');
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            input.addEventListener('input', handleTyping);
            setTimeout(() => input.focus(), 100);
        }

        // ============================================
        // TYPING INDICATOR
        // ============================================
        function handleTyping() {
            if (!auth.currentUser) return;
            
            // Set typing status
            db.collection("typing").doc(auth.currentUser.uid).set({
                username: currentUser,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            // Clear previous timeout
            if (typingTimeout) clearTimeout(typingTimeout);

            // Remove typing status after 3 seconds
            typingTimeout = setTimeout(() => {
                db.collection("typing").doc(auth.currentUser.uid).delete().catch(() => {});
            }, 3000);
        }

        function listenTyping() {
            typingListener = db.collection("typing").onSnapshot((snap) => {
                const typingUsers = [];
                snap.forEach((doc) => {
                    const data = doc.data();
                    if (data.username !== currentUser) {
                        typingUsers.push(data.username);
                    }
                });

                const indicator = document.getElementById('typingIndicator');
                const typingText = document.getElementById('typingText');
                
                if (typingUsers.length > 0) {
                    indicator.style.display = 'flex';
                    if (typingUsers.length === 1) {
                        typingText.textContent = `${typingUsers[0]} is typing`;
                    } else if (typingUsers.length === 2) {
                        typingText.textContent = `${typingUsers[0]} and ${typingUsers[1]} are typing`;
                    } else {
                        typingText.textContent = `${typingUsers.length} people are typing`;
                    }
                } else {
                    indicator.style.display = 'none';
                }
            });
        }

        // ============================================
        // CHAT FUNCTIONS
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                const messageRef = await db.collection("messages").add({
                    text, 
                    username: currentUser, 
                    country: currentCountry,
                    flag: countryFlags[currentCountry] || '🌍',
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    userId: auth.currentUser ? auth.currentUser.uid : 'unknown',
                    isAdmin,
                    status: 'sent',
                    readBy: [currentUser] // Sender has read their own message
                });
                
                // Clear typing indicator
                if (typingTimeout) clearTimeout(typingTimeout);
                db.collection("typing").doc(auth.currentUser.uid).delete().catch(() => {});
                
                input.value = '';
            } catch (err) {
                alert("Failed to send: " + err.message);
            }
        }

        function listenMessages() {
            if (messagesListener) messagesListener();
            
            messagesListener = db.collection("messages").orderBy("timestamp", "asc").onSnapshot((snap) => {
                const container = document.getElementById('messagesContainer');
                
                snap.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        showMessage(change.doc.id, change.doc.data());
                    } else if (change.type === "modified") {
                        updateMessage(change.doc.id, change.doc.data());
                    } else if (change.type === "removed") {
                        removeMessageElement(change.doc.id);
                    }
                });
                
                container.scrollTop = container.scrollHeight;
            });
        }

        function showMessage(id, msg) {
            const container = document.getElementById('messagesContainer');
            const isMe = msg.username === currentUser;
            const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            
            // Check if message already exists
            if (document.getElementById(`msg-${id}`)) return;

            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = 'message ' + (isMe ? 'my-message' : '');
            
            const statusHtml = isMe ? getStatusHtml(msg) : '';
            const deleteBtn = (isMe || isAdmin) ? `<button class="delete-btn" onclick="deleteMessage('${id}')" title="Delete message">✕</button>` : '';
            
            div.innerHTML = `
                ${deleteBtn}
                <div class="message-header">
                    <span class="username">${msg.flag || '🌍'} ${msg.isAdmin ? '👑 ' : ''}${msg.username}</span>
                    <span class="timestamp">${time}</span>
                </div>
                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                ${statusHtml}
            `;
            container.appendChild(div);

            // Mark as read if not my message
            if (!isMe) {
                markAsRead(id, msg);
            }
        }

        function updateMessage(id, msg) {
            const el = document.getElementById(`msg-${id}`);
            if (!el) return;

            const isMe = msg.username === currentUser;
            if (isMe) {
                const statusDiv = el.querySelector('.message-status');
                if (statusDiv) {
                    statusDiv.outerHTML = getStatusHtml(msg);
                }
            }
        }

        function getStatusHtml(msg) {
            let statusIcon = '✓';
            let statusClass = '';
            let statusText = 'Sent';
            
            if (msg.status === 'delivered') {
                statusIcon = '✓✓';
                statusText = 'Delivered';
            } else if (msg.status === 'read') {
                statusIcon = '✓✓';
                statusClass = 'status-read';
                statusText = 'Read';
            }

            const readCount = msg.readBy ? msg.readBy.length - 1 : 0; // Exclude sender
            
            return `
                <div class="message-status">
                    <span class="status-icon ${statusClass}">${statusIcon}</span>
                    <span>${statusText}${readCount > 0 ? ` (${readCount})` : ''}</span>
                </div>
            `;
        }

        function removeMessageElement(id) {
            const el = document.getElementById(`msg-${id}`);
            if (el) {
                el.style.opacity = '0';
                el.style.transform = 'scale(0.8)';
                setTimeout(() => el.remove(), 300);
            }
        }

        // ============================================
        // READ RECEIPTS
        // ============================================
        async function markAsRead(messageId, msgData) {
            if (!auth.currentUser) return;
            
            const readBy = msgData.readBy || [];
            if (!readBy.includes(currentUser)) {
                readBy.push(currentUser);
                
                // Update status based on read count
                let newStatus = msgData.status;
                if (readBy.length > 1) {
                    newStatus = 'read';
                } else if (msgData.status === 'sent') {
                    newStatus = 'delivered';
                }

                await db.collection("messages").doc(messageId).update({
                    readBy: readBy,
                    status: newStatus
                });
            }
        }

        function updateReadReceipts() {
            // Listen for read receipt updates on messages sent by current user
            readReceiptsListener = db.collection("messages")
                .where("username", "==", currentUser)
                .onSnapshot((snap) => {
                    snap.docChanges().forEach((change) => {
                        if (change.type === "modified") {
                            updateMessage(change.doc.id, change.doc.data());
                        }
                    });
                });
        }

        // ============================================
        // MESSAGE DELETE
        // ============================================
        async function deleteMessage(messageId) {
            if (!confirm('Are you sure you want to delete this message?')) return;
            
            try {
                await db.collection("messages").doc(messageId).delete();
            } catch (err) {
                alert("Failed to delete message: " + err.message);
            }
        }

        // ============================================
        // ADMIN PANEL
        // ============================================
        function openAdminPanel() {
            document.getElementById('adminPanel').style.display = 'flex';
            loadUsers();
        }

        function closeAdminPanel() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        async function loadUsers() {
            const container = document.getElementById('adminContent');
            container.innerHTML = '<h3>User Management</h3>';
            
            try {
                const snap = await db.collection("users").get();
                snap.forEach((doc) => {
                    const user = doc.data();
                    const div = document.createElement('div');
                    div.className = 'user-item';
                    div.innerHTML = `
                        <div>${user.flag || '🌍'} ${user.username} ${user.isAdmin ? '👑' : ''}</div>
                        <button class="${user.isBlocked ? 'btn-unblock' : 'btn-block'}" onclick="${user.isBlocked ? 'unblock' : 'block'}User('${doc.id}')">${user.isBlocked ? 'Unblock' : 'Block'}</button>
                    `;
                    container.appendChild(div);
                });
            } catch (e) {
                container.innerHTML += 'Error loading users';
            }
        }

        async function blockUser(id) {
            await db.collection("users").doc(id).update({ isBlocked: true });
            loadUsers();
        }

        async function unblockUser(id) {
            await db.collection("users").doc(id).update({ isBlocked: false });
            loadUsers();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // ============================================
        // CLEANUP
        // ============================================
        window.addEventListener('beforeunload', () => {
            if (auth.currentUser) {
                db.collection("typing").doc(auth.currentUser.uid).delete().catch(() => {});
            }
        });

        // Enter key handlers
        document.getElementById('loginUsername').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginPassword').focus(); });
        document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
        document.getElementById('regUsername').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('regPassword').focus(); });
        document.getElementById('regPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
    </script>

</body>
</html>
