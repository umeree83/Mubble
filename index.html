<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mubble - Group Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* ============================================
           CSS VARIABLES - LIGHT & DARK THEMES
           ============================================ */
        :root {
            /* Light Theme (Default) */
            --bg-cream: #faf8f5;
            --bg-cream-dark: #f5f0e8;
            --text-dark: #4a4a4a;
            --text-muted: #888;
            --accent-pink: #ff6ec7;
            --accent-purple: #8e6cff;
            --accent-blue: #6c9eff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(142, 108, 255, 0.15);
            
            /* Chat Light */
            --chat-bg: linear-gradient(135deg, #fff5f7 0%, #f8f5ff 50%, #f0f8ff 100%);
            --chat-header-bg: rgba(255, 255, 255, 0.95);
            --chat-header-text: #4a4a4a;
            --message-bg: rgba(255, 255, 255, 0.9);
            --message-text: #4a4a4a;
            --input-area-bg: rgba(255, 255, 255, 0.95);
            --reply-bg: rgba(142, 108, 255, 0.1);
        }

        /* Dark Theme */
        [data-theme="dark"] {
            --bg-cream: #1a1a2e;
            --bg-cream-dark: #16213e;
            --text-dark: #eaeaea;
            --text-muted: #aaa;
            --accent-pink: #ff6ec7;
            --accent-purple: #a88beb;
            --accent-blue: #6c9eff;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(142, 108, 255, 0.3);
            --input-bg: rgba(15, 52, 96, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.3);
            
            /* Chat Dark */
            --chat-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --chat-header-bg: rgba(22, 33, 62, 0.95);
            --chat-header-text: #eaeaea;
            --message-bg: rgba(15, 52, 96, 0.6);
            --message-text: #eaeaea;
            --input-area-bg: rgba(22, 33, 62, 0.95);
            --reply-bg: rgba(142, 108, 255, 0.2);
        }

        html, body {
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* ============================================
           THEME TOGGLE BUTTON - LOGIN PAGE (TOP RIGHT)
           ============================================ */
        #themeToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        /* Light theme toggle */
        :root #themeToggle {
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Dark theme toggle */
        [data-theme="dark"] #themeToggle {
            background: rgba(22, 33, 62, 0.9);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #themeToggle:hover {
            transform: scale(1.1);
        }

        /* ============================================
           THEME TOGGLE BUTTON - CHAT PAGE (TOP LEFT)
           ============================================ */
        .chat-active #themeToggle {
            top: 12px;
            left: 12px;
            right: auto;
            width: 40px;
            height: 40px;
            font-size: 20px;
            z-index: 101;
        }

        /* ============================================
           PROFILE BUTTON - TOP RIGHT CORNER
           ============================================ */
        #profileBtn {
            position: fixed;
            top: 65px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid var(--accent-purple);
            background: var(--glass-bg);
            cursor: pointer;
            z-index: 1000;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(142, 108, 255, 0.4);
            transition: all 0.3s ease;
            display: none;
        }

        #profileBtn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(142, 108, 255, 0.6);
        }

        #profileBtn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Chat active state for profile button */
        .chat-active #profileBtn {
            display: block;
        }

        /* ============================================
           ANIMATED BACKGROUND - WORKS ON BOTH THEMES
           ============================================ */
        #loginBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            transition: background 0.5s ease;
        }

        /* Light background */
        :root #loginBackground {
            background: linear-gradient(135deg, #fff5f7 0%, #f8f5ff 50%, #f0f8ff 100%);
        }

        /* Dark background */
        [data-theme="dark"] #loginBackground {
            background: linear-gradient(135deg, #2d1b2e 0%, #1f1b3a 50%, #1b2638 100%);
        }

        .mubble-text {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 15px;
            animation: float 8s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
            transition: all 0.5s ease;
        }

        /* Light theme text */
        :root .mubble-text {
            opacity: 0.15;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff, #6c9eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(142, 108, 255, 0.3);
        }

        /* Dark theme text */
        [data-theme="dark"] .mubble-text {
            opacity: 0.25;
            background: linear-gradient(45deg, #ff9ad5, #c4b5ff, #9bb5ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 50px rgba(196, 181, 255, 0.4);
        }

        .mubble-text:nth-child(1) { animation-delay: 0s; }
        .mubble-text:nth-child(2) { animation-delay: -2s; }
        .mubble-text:nth-child(3) { animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }

        /* Animation stops when chat opens */
        .chat-active #loginBackground {
            display: none;
        }

        /* ============================================
           LOGIN SCREEN - CENTERED
           ============================================ */
        #loginScreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            padding: 40px 35px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            max-height: 85vh;
            overflow-y: auto;
            transition: all 0.5s ease;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        /* Light login screen */
        :root #loginScreen {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px var(--shadow-color), inset 0 0 20px rgba(255, 255, 255, 0.8);
        }

        /* Dark login screen */
        [data-theme="dark"] #loginScreen {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px var(--shadow-color), inset 0 0 20px rgba(255, 255, 255, 0.05);
        }

        /* MUBBLE Logo */
        .app-logo {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff, #6c9eff, #ff6ec7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            letter-spacing: 3px;
            animation: glitter 3s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }

        .app-logo::after {
            content: 'Mubble';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.8) 50%, transparent 70%);
            background-size: 200% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shimmer 2s infinite;
            pointer-events: none;
        }

        @keyframes glitter {
            0%, 100% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.2); }
        }

        @keyframes shimmer {
            0% { background-position: -100% 0; }
            100% { background-position: 100% 0; }
        }

        .tagline {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
            transition: color 0.3s;
        }

        /* AUTH TABS */
        #authTabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 14px;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: -1;
        }

        .tab-btn.active {
            color: white;
            border-color: transparent;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(142, 108, 255, 0.3);
        }

        .tab-btn.active::before {
            opacity: 1;
        }

        /* FORM INPUTS */
        .auth-form input, .auth-form select {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 15px;
            border: 2px solid rgba(142, 108, 255, 0.15);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: inherit;
            background: var(--input-bg);
            color: var(--text-dark);
        }

        .auth-form input:focus, .auth-form select:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(142, 108, 255, 0.2);
        }

        .auth-form input::placeholder {
            color: var(--text-muted);
            opacity: 0.6;
        }

        /* BUTTONS */
        #loginBtn, #registerBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff9ad5, #a88beb);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(168, 139, 235, 0.3);
        }

        #loginBtn:hover, #registerBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(168, 139, 235, 0.4);
        }

        #loginBtn:disabled, #registerBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ============================================
           CHAT SCREEN - BOTH THEMES
           ============================================ */
        #chatScreen {
            display: none;
            width: 100%;
            height: 100vh;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: var(--chat-bg);
            transition: background 0.5s ease;
        }

        #chatHeader {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid rgba(142, 108, 255, 0.2);
            backdrop-filter: blur(10px);
            background: var(--chat-header-bg);
            color: var(--chat-header-text);
            transition: all 0.3s;
            padding-left: 60px;  /* Space for theme button */
        }

        #chatHeader h2 {
            font-size: 18px;
            font-weight: 600;
        }

        #onlineCount {
            display: none; /* Hidden as requested */
        }

        #messagesContainer {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            background: transparent;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message:hover {
            transform: translateX(5px);
        }

        .my-message:hover {
            transform: translateX(-5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            gap: 8px;
        }

        .username {
            font-weight: 700;
            color: var(--accent-pink);
            font-size: 13px;
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 11px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            display: inline-block;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
            backdrop-filter: blur(5px);
            background: var(--message-bg);
            color: var(--message-text);
            border: 1px solid rgba(142, 108, 255, 0.2);
            transition: all 0.3s;
            position: relative;
        }

        .my-message {
            text-align: right;
        }

        .my-message .username {
            color: var(--accent-purple);
        }

        .my-message .message-bubble {
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
        }

        /* Reply Styles */
        .reply-preview {
            background: var(--reply-bg);
            border-left: 3px solid var(--accent-purple);
            padding: 8px 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            font-size: 13px;
            max-width: 100%;
        }

        .reply-preview-text {
            color: var(--text-muted);
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .reply-to {
            background: var(--reply-bg);
            border-left: 3px solid var(--accent-purple);
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
        }

        .reply-to-name {
            font-weight: 600;
            color: var(--accent-purple);
        }

        .reply-to-text {
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 2px;
        }

        /* Message Status Indicators */
        .message-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        .my-message .message-status {
            justify-content: flex-end;
        }

        .status-icon {
            font-size: 12px;
        }

        .status-read {
            color: #4fc3f7;
        }

        /* Reply Button on Hover */
        .reply-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent-purple);
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 12px;
            display: none;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 10;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .message:hover .reply-btn {
            display: flex;
            opacity: 1;
        }

        .reply-btn:hover {
            transform: translateY(-50%) scale(1.1);
        }

        .my-message .reply-btn {
            left: -35px;
        }

        .message:not(.my-message) .reply-btn {
            right: -35px;
        }

        /* Reply Preview in Input Area */
        #replyPreview {
            display: none;
            background: var(--reply-bg);
            border-left: 3px solid var(--accent-purple);
            padding: 10px 15px;
            margin: 0 15px;
            border-radius: 10px;
            position: relative;
            animation: slideDown 0.3s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #replyPreviewText {
            font-size: 13px;
            color: var(--text-muted);
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            padding-right: 25px;
        }

        #cancelReply {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #cancelReply:hover {
            color: var(--accent-pink);
        }

        #inputArea {
            padding: 12px 15px;
            display: flex;
            gap: 10px;
            backdrop-filter: blur(10px);
            background: var(--input-area-bg);
            border-top: 2px solid rgba(142, 108, 255, 0.2);
            transition: all 0.3s;
            flex-direction: column;
        }

        #inputRow {
            display: flex;
            gap: 10px;
            width: 100%;
        }

        #messageInput {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid rgba(142, 108, 255, 0.2);
            border-radius: 25px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: var(--input-bg);
            color: var(--text-dark);
        }

        #messageInput:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 15px rgba(142, 108, 255, 0.2);
        }

        #sendBtn {
            padding: 14px 24px;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(142, 108, 255, 0.3);
        }

        #sendBtn:hover {
            transform: scale(1.05);
        }

        /* ============================================
           PROFILE PANEL STYLES
           ============================================ */
        #profilePanel {
            position: fixed;
            top: 0;
            right: -100%;
            width: 100%;
            max-width: 450px;
            height: 100%;
            background: var(--chat-bg);
            z-index: 1000;
            transition: right 0.4s ease;
            display: flex;
            flex-direction: column;
            box-shadow: -10px 0 40px rgba(0,0,0,0.3);
        }

        #profilePanel.open {
            right: 0;
        }

        #profileHeader {
            padding: 20px;
            background: var(--chat-header-bg);
            border-bottom: 2px solid rgba(142, 108, 255, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #profileHeader h2 {
            color: var(--chat-header-text);
            font-size: 20px;
        }

        #closeProfile {
            background: none;
            border: none;
            font-size: 28px;
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s;
        }

        #closeProfile:hover {
            color: var(--accent-pink);
        }

        #profileContent {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
        }

        .profile-section {
            margin-bottom: 30px;
        }

        .profile-section-title {
            font-size: 14px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Profile Picture Section */
        .profile-pic-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .profile-pic-large {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 4px solid var(--accent-purple);
            object-fit: cover;
            margin-bottom: 15px;
            box-shadow: 0 5px 20px rgba(142, 108, 255, 0.3);
        }

        .change-pic-btn {
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(142, 108, 255, 0.3);
        }

        .change-pic-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(142, 108, 255, 0.4);
        }

        /* Avatar Selection Modal */
        #avatarModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        #avatarModal.active {
            display: flex;
        }

        .avatar-modal-content {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .avatar-modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .avatar-modal-header h3 {
            color: var(--chat-header-text);
            font-size: 20px;
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .avatar-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .avatar-option {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 15px;
            border: 3px solid transparent;
            cursor: pointer;
            overflow: hidden;
            transition: all 0.3s;
            position: relative;
        }

        .avatar-option:hover {
            transform: scale(1.05);
            border-color: var(--accent-purple);
        }

        const db = firebase.firestore();

        let currentUser = "", currentCountry = "", currentUserDocId = "";

        // ============================================

        function showTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'login' ? 'none' : 'block';
        }

        async function ensureAuth() {
            if (auth.currentUser) return auth.currentUser;
            const result = await auth.signInAnonymously();
            return result.user;
        }

        // ============================================
        // LOGIN
        // ============================================
        async function loginUser() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) { alert("Fill all fields!"); return; }

            btn.disabled = true;
            btn.textContent = 'Please wait...';

            try {
                await ensureAuth();

                const snap = await db.collection("users").where("username", "==", username).get();

                if (snap.empty) { alert("User not found!"); btn.disabled = false; btn.textContent = 'Login'; return; }

                const doc = snap.docs[0];
                const data = doc.data();
                
                if (data.password !== password) { alert("Wrong password!"); btn.disabled = false; btn.textContent = 'Login'; return; }
                if (data.isBlocked) { alert("Account blocked!"); btn.disabled = false; btn.textContent = 'Login'; return; }

                currentUser = data.username;
                currentCountry = data.country;
                currentUserDocId = doc.id;
                
                // Load user profile data
                userProfileData = {
                    username: data.username,
                    bio: data.bio || '',
                    avatar: data.avatar || defaultAvatars[0].url,
                    country: data.country
                };
                selectedAvatar = userProfileData.avatar;

                enterChat();

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        // ============================================
        // REGISTER
        // ============================================
        async function registerUser() {
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const country = document.getElementById('countrySelect').value;
            const btn = document.getElementById('registerBtn');

            if (!username || !password || !country) { alert("Fill all fields!"); return; }
            if (password.length < 4) { alert("Password too short!"); return; }

            btn.disabled = true;
            btn.textContent = 'Creating...';

            try {
                const existing = await db.collection("users").where("username", "==", username).get();
                if (!existing.empty) { alert("Username taken!"); btn.disabled = false; btn.textContent = 'Create Account'; return; }

                const user = await ensureAuth();

                const userData = {
                    username,
                    password,
                    country,
                    flag: countryFlags[country],
                    bio: '',
                    avatar: defaultAvatars[0].url,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    isBlocked: false,
                    userId: user.uid
                };

                const docRef = await db.collection("users").add(userData);
                
                currentUser = username;
                currentCountry = country;
                currentUserDocId = docRef.id;
                userProfileData = {
                    username: username,
                    bio: '',
                    avatar: defaultAvatars[0].url,
                    country: country
                };
                selectedAvatar = defaultAvatars[0].url;

                alert("Account created! Please login.");
                showTab('login', document.querySelectorAll('.tab-btn')[0]);
                document.getElementById('loginUsername').value = username;
                btn.disabled = false;
                btn.textContent = 'Create Account';

            } catch (err) {
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        }

        // ENTER CHAT
        // ============================================
        function enterChat() {
            document.body.classList.add('chat-active');
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('loginBackground').style.display = 'none';
            document.getElementById('chatScreen').style.display = 'flex';

            // Update profile UI with user data
            updateProfileUI();

            listenMessages();
            setupInput();
            updateReadReceipts();

            const input = document.getElementById('messageInput');
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
            setTimeout(() => input.focus(), 100);
        }

        // ============================================
        // PROFILE FUNCTIONS
        // ============================================
        function openProfile() {
            // Refresh profile data before opening
            refreshProfileData().then(() => {
                document.getElementById('profilePanel').classList.add('open');
            });
        }

        function closeProfile() {
            document.getElementById('profilePanel').classList.remove('open');
        }

        // Refresh profile data from Firestore
        async function refreshProfileData() {
            if (!currentUserDocId) return;
            
            try {
                const doc = await db.collection("users").doc(currentUserDocId).get();
                if (doc.exists) {
                    const data = doc.data();
                    userProfileData = {
                        username: data.username,
                        bio: data.bio || '',
                        avatar: data.avatar || defaultAvatars[0].url,
                        country: data.country
                    };
                    selectedAvatar = userProfileData.avatar;
                    updateProfileUI();
                }
            } catch (err) {
                console.error("Error refreshing profile:", err);
            }
        }

        function updateProfileUI() {
            document.getElementById('profilePicLarge').src = userProfileData.avatar;
            document.getElementById('profileBtnImg').src = userProfileData.avatar;
            document.getElementById('profileUsername').value = userProfileData.username;
            document.getElementById('profileBio').value = userProfileData.bio || '';
            document.getElementById('profileCountry').value = `${countryFlags[userProfileData.country]} ${userProfileData.country}`;
            selectedAvatar = userProfileData.avatar;
        }

        function openAvatarModal() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            
            defaultAvatars.forEach(avatar => {
                const div = document.createElement('div');
                div.className = 'avatar-option';
                if (avatar.url === selectedAvatar) div.classList.add('selected');
                
                div.innerHTML = `
                    <img src="${avatar.url}" alt="${avatar.name}">
                    <div class="avatar-check">вЬУ</div>
                `;
                
                div.onclick = () => selectAvatar(avatar.url, div);
                grid.appendChild(div);
            });
            
            document.getElementById('avatarModal').classList.add('active');
        }

        function closeAvatarModal() {
            document.getElementById('avatarModal').classList.remove('active');
        }

        function selectAvatar(url, element) {
            selectedAvatar = url;
            document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
            element.classList.add('selected');
            
            // Preview immediately
            document.getElementById('profilePicLarge').src = url;
        }

        // ============================================
        // SAVE PROFILE - FIXED AND FUNCTIONAL
        // ============================================
        async function saveProfile() {
            const btn = document.querySelector('.save-profile-btn');
            const newUsername = document.getElementById('profileUsername').value.trim();
            const newBio = document.getElementById('profileBio').value.trim();
            
            // Validation
            if (!newUsername) {
                alert("Username cannot be empty!");
                return;
            }

            // Check if anything changed
            const usernameChanged = newUsername !== currentUser;
            const bioChanged = newBio !== (userProfileData.bio || '');
            const avatarChanged = selectedAvatar !== userProfileData.avatar;

            if (!usernameChanged && !bioChanged && !avatarChanged) {
                alert("No changes made!");
                closeProfile();
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                // Step 1: Check if username is taken (only if username changed)
                if (usernameChanged) {
                    const existing = await db.collection("users")
                        .where("username", "==", newUsername)
                        .get();
                    
                    // Check if any document exists with this username (excluding current user)
                    let usernameTaken = false;
                    existing.forEach(doc => {
                        if (doc.id !== currentUserDocId) {
                            usernameTaken = true;
                        }
                    });

                    if (usernameTaken) {
                        alert("Username already taken!");
                        btn.disabled = false;
                        btn.textContent = 'рЯТЊ Save Changes';
                        return;
                    }
                }

                // Step 2: Update user document in Firestore
                const updateData = {};
                if (usernameChanged) updateData.username = newUsername;
                if (bioChanged) updateData.bio = newBio;
                if (avatarChanged) updateData.avatar = selectedAvatar;

                await db.collection("users").doc(currentUserDocId).update(updateData);

                // Step 3: Update messages if username or avatar changed
                if (usernameChanged || avatarChanged) {
                    try {
                        const messagesSnap = await db.collection("messages")
                            .where("username", "==", currentUser)
                            .limit(500) // Limit to prevent timeout
                            .get();

                        if (!messagesSnap.empty) {
                            const batch = db.batch();
                            let operationCount = 0;
                            
                            messagesSnap.forEach(doc => {
                                const msgUpdate = {};
                                if (usernameChanged) msgUpdate.username = newUsername;
                                if (avatarChanged) msgUpdate.avatar = selectedAvatar;
                                
                                batch.update(doc.ref, msgUpdate);
                                operationCount++;
                                
                                // Firestore batch limit is 500 operations
                                if (operationCount >= 450) {
                                    return; // Stop adding to this batch
                                }
                            });
                            
                            await batch.commit();
                        }
                    } catch (msgErr) {
                        console.error("Error updating messages:", msgErr);
                        // Don't fail the whole operation if message update fails
                    }
                }

                // Step 4: Update local state
                const oldUsername = currentUser;
                currentUser = newUsername;
                userProfileData = {
                    username: newUsername,
                    bio: newBio,
                    avatar: selectedAvatar,
                    country: currentCountry
                };

                // Step 5: Update UI
                document.getElementById('profileBtnImg').src = selectedAvatar;
                
                btn.disabled = false;
                btn.textContent = 'рЯТЊ Save Changes';
                
                alert("Profile updated successfully!");
                closeProfile();
                closeAvatarModal();

            } catch (err) {
                console.error("Save profile error:", err);
                alert("Error saving profile: " + (err.message || "Unknown error"));
                btn.disabled = false;
                btn.textContent = 'рЯТЊ Save Changes';
            }
        }

        // ============================================
        // REPLY FEATURE
        // ============================================
        function startReply(messageId, username, text) {
            replyingTo = { id: messageId, username, text };
            const preview = document.getElementById('replyPreview');
            const previewText = document.getElementById('replyPreviewText');
            
            previewText.textContent = `Replying to ${username}: "${text.substring(0, 50)}${text.length > 50 ? '...' : ''}"`;
            preview.style.display = 'block';
            
            document.getElementById('messageInput').focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('replyPreview').style.display = 'none';
        }

        // ============================================
        // CHAT FUNCTIONS
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text) return;

            try {
                const messageData = {
                    text, 
                    username: currentUser, 
                    country: currentCountry,
                    flag: countryFlags[currentCountry] || 'рЯМН',
                    avatar: userProfileData.avatar,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    userId: auth.currentUser ? auth.currentUser.uid : 'unknown',
                    status: 'sent',
                    readBy: [currentUser]
                };

                if (replyingTo) {
                    messageData.replyTo = {
                        id: replyingTo.id,
                        username: replyingTo.username,
                        text: replyingTo.text.substring(0, 100)
                    };
                }

                await db.collection("messages").add(messageData);
                
                input.value = '';
                cancelReply();
            } catch (err) {
                alert("Failed to send: " + err.message);
            }
        }

        function listenMessages() {
            if (messagesListener) messagesListener();
            
            messagesListener = db.collection("messages")
                .orderBy("timestamp", "asc")
                .onSnapshot((snap) => {
                    const container = document.getElementById('messagesContainer');
                    
                    snap.docChanges().forEach((change) => {
                        if (change.type === "added") {
                            showMessage(change.doc.id, change.doc.data());
                        } else if (change.type === "modified") {
                            updateMessage(change.doc.id, change.doc.data());
                        } else if (change.type === "removed") {
                            removeMessageElement(change.doc.id);
                        }
                    });
                    
                    container.scrollTop = container.scrollHeight;
                });
        }

        function showMessage(id, msg) {
            const container = document.getElementById('messagesContainer');
            const isMe = msg.username === currentUser;
            const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            
            if (document.getElementById(`msg-${id}`)) return;

            const div = document.createElement('div');
            div.id = `msg-${id}`;
            div.className = 'message ' + (isMe ? 'my-message' : '');
            
            // Reply preview
            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `
                    <div class="reply-to">
                        <span class="reply-to-name">${msg.replyTo.username}</span>
                        <div class="reply-to-text">${escapeHtml(msg.replyTo.text)}</div>
                    </div>
                `;
            }
            
            const statusHtml = isMe ? getStatusHtml(msg) : '';
            const avatarUrl = msg.avatar || defaultAvatars[0].url;
            
            div.innerHTML = `
                <button class="reply-btn" onclick="startReply('${id}', '${msg.username}', '${escapeHtml(msg.text).replace(/'/g, "\\'")}')" title="Reply">вЖ©пЄП</button>
                <div class="message-header">
                    <img src="${avatarUrl}" class="user-avatar-small" alt="avatar">
                    <span class="username">${msg.flag || 'рЯМН'} ${msg.username}</span>
                    <span class="timestamp">${time}</span>
                </div>
                ${replyHtml}
                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                ${statusHtml}
            `;
            
            // Double click to reply
            div.addEventListener('dblclick', () => {
                startReply(id, msg.username, msg.text);
            });
            
            container.appendChild(div);

            if (!isMe) {
                markAsRead(id, msg);
            }
        }

        function updateMessage(id, msg) {
            const el = document.getElementById(`msg-${id}`);
            if (!el) return;

            const isMe = msg.username === currentUser;
            
            // Update avatar if changed
            const avatarImg = el.querySelector('.user-avatar-small');
            if (avatarImg && msg.avatar) {
                avatarImg.src = msg.avatar;
            }
            
            // Update username if changed
            const usernameSpan = el.querySelector('.username');
            if (usernameSpan) {
                usernameSpan.innerHTML = `${msg.flag || 'рЯМН'} ${msg.username}`;
            }
            
            if (isMe) {
                const statusDiv = el.querySelector('.message-status');
                if (statusDiv) {
                    statusDiv.outerHTML = getStatusHtml(msg);
                }
            }
        }

        function removeMessageElement(id) {
            const el = document.getElementById(`msg-${id}`);
            if (el) {
                el.style.opacity = '0';
                el.style.transform = 'scale(0.8)';
                setTimeout(() => el.remove(), 300);
            }
        }

        function getStatusHtml(msg) {
            let statusIcon = 'вЬУ';
            let statusClass = '';
            let statusText = 'Sent';
            
            if (msg.status === 'delivered') {
                statusIcon = 'вЬУвЬУ';
                statusText = 'Delivered';
            } else if (msg.status === 'read') {
                statusIcon = 'вЬУвЬУ';
                statusClass = 'status-read';
                statusText = 'Read';
            }

            const readCount = msg.readBy ? msg.readBy.length - 1 : 0;
            
            return `
                <div class="message-status">
                    <span class="status-icon ${statusClass}">${statusIcon}</span>
                    <span>${statusText}${readCount > 0 ? ` (${readCount})` : ''}</span>
                </div>
            `;
        }

        // ============================================
        // READ RECEIPTS
        // ============================================
        async function markAsRead(messageId, msgData) {
            if (!auth.currentUser) return;
            
            const readBy = msgData.readBy || [];
            if (!readBy.includes(currentUser)) {
                readBy.push(currentUser);
                
                let newStatus = msgData.status;
                if (readBy.length > 1) {
                    newStatus = 'read';
                } else if (msgData.status === 'sent') {
                    newStatus = 'delivered';
                }

                await db.collection("messages").doc(messageId).update({
                    readBy: readBy,
                    status: newStatus
                });
            }
        }

        function updateReadReceipts() {
            readReceiptsListener = db.collection("messages")
                .where("username", "==", currentUser)
                .onSnapshot((snap) => {
                    snap.docChanges().forEach((change) => {
                        if (change.type === "modified") {
                            updateMessage(change.doc.id, change.doc.data());
                        }
                    });
                });
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Enter key handlers
        document.getElementById('loginUsername').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('loginPassword').focus(); });
        document.getElementById('loginPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') loginUser(); });
        document.getElementById('regUsername').addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('regPassword').focus(); });
        document.getElementById('regPassword').addEventListener('keypress', (e) => { if (e.key === 'Enter') registerUser(); });
    </script>

</body>
