<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Mubble - Chat App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg-cream: #faf8f5;
            --bg-cream-dark: #f5f0e8;
            --text-dark: #4a4a4a;
            --text-muted: #888;
            --accent-pink: #ff6ec7;
            --accent-purple: #8e6cff;
            --accent-blue: #6c9eff;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.5);
            --input-bg: rgba(255, 255, 255, 0.9);
            --shadow-color: rgba(142, 108, 255, 0.15);
            --chat-bg: linear-gradient(135deg, #fff5f7 0%, #f8f5ff 50%, #f0f8ff 100%);
            --chat-header-bg: rgba(255, 255, 255, 0.95);
            --chat-header-text: #4a4a4a;
            --message-bg: rgba(255, 255, 255, 0.9);
            --message-text: #4a4a4a;
            --input-area-bg: rgba(255, 255, 255, 0.95);
            --reply-bg: rgba(142, 108, 255, 0.1);
            --card-bg: rgba(255, 255, 255, 0.9);
            --room-card-bg: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.7) 100%);
        }

        [data-theme="dark"] {
            --bg-cream: #1a1a2e;
            --bg-cream-dark: #16213e;
            --text-dark: #eaeaea;
            --text-muted: #aaa;
            --accent-pink: #ff6ec7;
            --accent-purple: #a88beb;
            --accent-blue: #6c9eff;
            --glass-bg: rgba(22, 33, 62, 0.85);
            --glass-border: rgba(142, 108, 255, 0.3);
            --input-bg: rgba(15, 52, 96, 0.6);
            --shadow-color: rgba(0, 0, 0, 0.3);
            --chat-bg: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --chat-header-bg: rgba(22, 33, 62, 0.95);
            --chat-header-text: #eaeaea;
            --message-bg: rgba(15, 52, 96, 0.6);
            --message-text: #eaeaea;
            --input-area-bg: rgba(22, 33, 62, 0.95);
            --reply-bg: rgba(142, 108, 255, 0.2);
            --card-bg: rgba(15, 52, 96, 0.6);
            --room-card-bg: linear-gradient(135deg, rgba(22,33,62,0.9) 0%, rgba(15,52,96,0.7) 100%);
        }

        html, body {
            height: 100%;
            height: 100dvh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: var(--bg-cream);
            position: fixed;
            width: 100%;
            width: 100vw;
        }

        #themeToggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            z-index: 1000;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            background: var(--glass-bg);
            box-shadow: 0 4px 15px var(--shadow-color);
        }

        #themeToggle:hover {
            transform: scale(1.1);
        }

        .app-active #themeToggle {
            top: 12px;
            left: 12px;
            right: auto;
            width: 40px;
            height: 40px;
            font-size: 20px;
        }

        #loginBackground {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: 100dvh;
            z-index: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            background: var(--chat-bg);
            transition: background 0.5s ease;
        }

        .mubble-text {
            font-size: 120px;
            font-weight: 900;
            letter-spacing: 15px;
            animation: float 8s ease-in-out infinite;
            user-select: none;
            pointer-events: none;
            opacity: 0.15;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple), var(--accent-blue));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        [data-theme="dark"] .mubble-text {
            opacity: 0.25;
        }

        .mubble-text:nth-child(1) { animation-delay: 0s; }
        .mubble-text:nth-child(2) { animation-delay: -2s; }
        .mubble-text:nth-child(3) { animation-delay: -4s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.02); }
        }

        .app-active #loginBackground {
            display: none;
        }

        #loginScreen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            padding: 40px 35px;
            border-radius: 25px;
            text-align: center;
            width: 90%;
            max-width: 380px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            backdrop-filter: blur(20px);
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 20px 60px var(--shadow-color);
        }

        .app-logo {
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff, #6c9eff, #ff6ec7);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            animation: glitter 3s ease-in-out infinite;
        }

        @keyframes glitter {
            0%, 100% { background-position: 0% 50%; filter: brightness(1); }
            50% { background-position: 100% 50%; filter: brightness(1.2); }
        }

        .tagline {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
        }

        #authTabs {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }

        .tab-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid transparent;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 14px;
            position: relative;
            overflow: hidden;
            background: rgba(142, 108, 255, 0.1);
            color: var(--text-muted);
        }

        .tab-btn.active {
            color: white;
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(142, 108, 255, 0.3);
        }

        .auth-form input, .auth-form select {
            width: 100%;
            padding: 16px 18px;
            margin-bottom: 15px;
            border: 2px solid rgba(142, 108, 255, 0.15);
            border-radius: 15px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            background: var(--input-bg);
            color: var(--text-dark);
        }

        .auth-form input:focus, .auth-form select:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(142, 108, 255, 0.2);
        }

        #loginBtn, #registerBtn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #ff9ad5, #a88beb);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            box-shadow: 0 10px 30px rgba(168, 139, 235, 0.3);
        }

        #loginBtn:hover, #registerBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(168, 139, 235, 0.4);
        }

        #loginBtn:disabled, #registerBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #appContainer {
            display: none;
            width: 100%;
            height: 100%;
            height: 100dvh;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            background: var(--chat-bg);
            overflow: hidden;
        }

        .app-active #appContainer {
            display: flex;
        }

        #topNav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            padding-left: 60px;
            padding-top: max(15px, env(safe-area-inset-top));
            background: var(--chat-header-bg);
            border-bottom: 2px solid rgba(142, 108, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 101;
            flex-shrink: 0;
        }

        #topNav h1 {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .nav-icons {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .nav-icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: none;
            background: var(--glass-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            transition: all 0.3s ease;
            box-shadow: 0 2px 10px var(--shadow-color);
            position: relative;
        }

        .nav-icon-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(142, 108, 255, 0.4);
        }

        .nav-icon-btn img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .notification-badge {
            position: absolute;
            top: -2px;
            right: -2px;
            background: #ff4757;
            color: white;
            font-size: 11px;
            font-weight: bold;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid var(--bg-cream);
        }

        #bottomNav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 12px 0;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            background: var(--chat-header-bg);
            border-top: 2px solid rgba(142, 108, 255, 0.2);
            backdrop-filter: blur(10px);
            z-index: 101;
            flex-shrink: 0;
            position: relative;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            color: var(--text-muted);
            border: none;
            background: none;
            font-family: inherit;
            min-height: 60px;
            justify-content: center;
        }

        .nav-item.active {
            color: var(--accent-purple);
        }

        .nav-item.active .nav-icon {
            transform: scale(1.1);
        }

        .nav-icon {
            font-size: 24px;
            transition: transform 0.3s ease;
        }

        .nav-label {
            font-size: 12px;
            font-weight: 600;
        }

        .screen {
            display: none;
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
            position: relative;
        }

        .screen.active {
            display: block;
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .room-card {
            background: var(--room-card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .room-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--accent-pink), var(--accent-purple), var(--accent-blue));
            opacity: 0;
            transition: opacity 0.3s;
        }

        .room-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--shadow-color);
        }

        .room-card:hover::before {
            opacity: 1;
        }

        .room-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .room-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .room-desc {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.5;
        }

        .room-online {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-top: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .online-dot {
            width: 8px;
            height: 8px;
            background: #2ecc71;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .inbox-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .inbox-header h2 {
            font-size: 28px;
            color: var(--text-dark);
        }

        .chat-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 800px;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: var(--card-bg);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .chat-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px var(--shadow-color);
        }

        .chat-item.unread {
            border-left: 4px solid var(--accent-pink);
        }

        .chat-avatar {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid var(--accent-purple);
            object-fit: cover;
            flex-shrink: 0;
        }

        .chat-info {
            flex: 1;
            min-width: 0;
        }

        .chat-name {
            font-weight: 700;
            color: var(--text-dark);
            font-size: 16px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chat-preview {
            color: var(--text-muted);
            font-size: 14px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 5px;
        }

        .chat-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .unread-count {
            background: var(--accent-pink);
            color: white;
            font-size: 12px;
            font-weight: bold;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .search-container {
            max-width: 600px;
            margin: 0 auto;
            padding-bottom: 20px;
        }

        .search-box {
            position: relative;
            margin-bottom: 25px;
        }

        .search-input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border: 2px solid rgba(142, 108, 255, 0.2);
            border-radius: 25px;
            font-size: 16px;
            background: var(--input-bg);
            color: var(--text-dark);
            outline: none;
            transition: all 0.3s;
        }

        .search-input:focus {
            border-color: var(--accent-purple);
            box-shadow: 0 0 20px rgba(142, 108, 255, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--text-muted);
        }

        .search-results {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .user-result {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 16px;
            border: 1px solid var(--glass-border);
        }

        .user-result-avatar {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: 3px solid var(--accent-purple);
            object-fit: cover;
        }

        .user-result-info {
            flex: 1;
        }

        .user-result-name {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .user-result-bio {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 6px;
            line-height: 1.4;
        }

        .user-result-country {
            font-size: 13px;
            color: var(--accent-purple);
            font-weight: 600;
        }

        .user-result-actions {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .action-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(45deg, var(--accent-pink), var(--accent-purple));
            color: white;
            box-shadow: 0 5px 15px rgba(142, 108, 255, 0.3);
        }

        .btn-primary:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(142, 108, 255, 0.4);
        }

        .btn-danger {
            background: rgba(255, 71, 87, 0.1);
            color: #ff4757;
            border: 1px solid rgba(255, 71, 87, 0.3);
        }

        .btn-danger:hover {
            background: rgba(255, 71, 87, 0.2);
        }

        #chatScreen {
            display: none;
            width: 100%;
            height: 100%;
            height: 100dvh;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 200;
            background: var(--chat-bg);
            overflow: hidden;
        }

        #chatScreen.active {
            display: flex;
        }

        #chatHeader {
            padding: 15px 20px;
            padding-left: 60px;
            padding-top: max(15px, env(safe-area-inset-top));
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 2px solid rgba(142, 108, 255, 0.2);
            backdrop-filter: blur(10px);
            background: var(--chat-header-bg);
            flex-shrink: 0;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--glass-bg);
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.1);
        }

        .chat-header-info {
            flex: 1;
        }

        .chat-header-info h3 {
            font-size: 18px;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .chat-header-info span {
            font-size: 13px;
            color: var(--text-muted);
        }

        #messagesContainer {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 20px;
            position: relative;
        }

        .message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .message:hover {
            transform: translateX(5px);
        }

        .my-message:hover {
            transform: translateX(-5px);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message-header {
            display: flex;
            align-items: center;
            margin-bottom: 5px;
            gap: 8px;
        }

        .username {
            font-weight: 700;
            color: var(--accent-pink);
            font-size: 13px;
        }

        .timestamp {
            color: var(--text-muted);
            font-size: 11px;
        }

        .message-bubble {
            padding: 12px 16px;
            border-radius: 18px;
            display: inline-block;
            max-width: 75%;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 15px;
            backdrop-filter: blur(5px);
            background: var(--message-bg);
            color: var(--message-text);
            border: 1px solid rgba(142, 108, 255, 0.2);
        }

        .my-message {
            text-align: right;
        }

        .my-message .username {
            color: var(--accent-purple);
        }

        .my-message .message-bubble {
            background: linear-gradient(45deg, #ff6ec7, #8e6cff);
            color: white;
            border: none;
        }

        .reply-to {
            background: var(--reply-bg);
            border-left: 3px solid var(--accent-purple);
            padding: 6px 10px;
            margin-bottom: 6px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-muted);
            text-align: left;
        }

        .reply-to-name {
            font-weight: 600;
            color: var(--accent-purple);
        }

        .reply-to-text {
            font-style: italic;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .message-status {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 4px;
            justify-content: flex-end;
        }

        .status-read {
            color: #4fc3f7;
        }

        .reply-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: var(--accent-purple);
            color: white;
            border: none;
            width: 28px;

        // ============================================
        // THEME MANAGEMENT
        // ============================================
        function initTheme() {
            const savedTheme = localStorage.getItem('mubble-theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeIcon(savedTheme);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('mubble-theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const toggle = document.getElementById('themeToggle');
            toggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        initTheme();

        // ============================================
        // AUTHENTICATION
        // ============================================
        function showTab(tab, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('registerForm').style.display = tab === 'login' ? 'none' : 'block';
        }

        async function ensureAuth() {
            if (auth.currentUser) return auth.currentUser;
            const result = await auth.signInAnonymously();
            return result.user;
        }

        async function loginUser() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!username || !password) { alert("Fill all fields!"); return; }

            btn.disabled = true;
            btn.textContent = 'Please wait...';

            try {
                await ensureAuth();
                const snap = await db.collection("users").where("username", "==", username).get();

                if (snap.empty) { alert("User not found!"); btn.disabled = false; btn.textContent = 'Login'; return; }

                const doc = snap.docs[0];
                const data = doc.data();
                
                if (data.password !== password) { alert("Wrong password!"); btn.disabled = false; btn.textContent = 'Login'; return; }
                if (data.isBlocked) { alert("Account blocked!"); btn.disabled = false; btn.textContent = 'Login'; return; }

                currentUser = data.username;
                currentUserId = data.userId || auth.currentUser.uid;
                currentCountry = data.country;
                currentUserDocId = doc.id;
                userProfileData = {
                    username: data.username,
                    bio: data.bio || '',
                    avatar: data.avatar || defaultAvatars[0].url,
                    country: data.country
                };
                selectedAvatar = userProfileData.avatar;

                if (!data.userId) {
                    await db.collection("users").doc(currentUserDocId).update({ userId: currentUserId });
                }

                await loadBlockedUsers();
                enterApp();

            } catch (err) {
                console.error("Login error:", err);
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.textContent = 'Login';
            }
        }

        // ============================================
        // CHAT SYSTEM - FIXED
        // ============================================
        function openRoom(roomId) {
            const room = rooms.find(r => r.id === roomId);
            currentChat = { type: 'room', id: roomId, name: room.name };
            
            document.getElementById('chatTitle').textContent = room.name;
            document.getElementById('chatSubtitle').textContent = 'Public Room';
            document.getElementById('messagesContainer').innerHTML = '';
            
            document.getElementById('chatScreen').classList.add('active');
            
            if (messagesListener) messagesListener();
            
            messagesListener = db.collection("roomMessages")
                .where("roomId", "==", roomId)
                .onSnapshot((snap) => {
                    const container = document.getElementById('messagesContainer');
                    
                    const messages = [];
                    snap.forEach(doc => {
                        messages.push({ id: doc.id, ...doc.data() });
                    });
                    
                    messages.sort((a, b) => {
                        const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                        const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                        return timeA - timeB;
                    });
                    
                    container.innerHTML = '';
                    messages.forEach(msg => {
                        showMessage(msg.id, msg);
                    });
                    
                    scrollToBottom();
                }, (error) => {
                    console.error("Room messages error:", error);
                });
        }

        async function openPrivateChat(otherUserId, otherUsername, otherAvatar) {
            if (!otherUserId || !otherUsername) {
                alert("Error: User information missing");
                return;
            }

            if (blockedUsers.has(otherUserId)) {
                alert("You have blocked this user. Unblock them to chat.");
                return;
            }

            try {
                const otherUserDoc = await db.collection("users").where("username", "==", otherUsername).get();
                if (!otherUserDoc.empty) {
                    const otherData = otherUserDoc.docs[0].data();
                    const otherBlocked = new Set(otherData.blockedUsers || []);
                    if (otherBlocked.has(currentUserId)) {
                        alert("This user has blocked you.");
                        return;
                    }
                }

                const chatQuery = await db.collection("privateChats")
                    .where("participants", "array-contains", currentUserId)
                    .get();

                let chatId = null;
                chatQuery.forEach(doc => {
                    const data = doc.data();
                    if (data.participants && data.participants.includes(otherUserId)) {
                        chatId = doc.id;
                    }
                });

                if (!chatId) {
                    const newChat = await db.collection("privateChats").add({
                        participants: [currentUserId, otherUserId],
                        participantNames: [currentUser, otherUsername],
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        lastMessage: '',
                        lastMessageTime: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    chatId = newChat.id;
                }

                currentChat = { 
                    type: 'private', 
                    id: chatId, 
                    name: otherUsername,
                    otherUserId: otherUserId,
                    otherAvatar: otherAvatar
                };

                document.getElementById('chatTitle').textContent = otherUsername;
                document.getElementById('chatSubtitle').textContent = 'Private Chat';
                document.getElementById('messagesContainer').innerHTML = '';
                document.getElementById('chatScreen').classList.add('active');

                if (messagesListener) messagesListener();

                messagesListener = db.collection("messages")
                    .where("chatId", "==", chatId)
                    .onSnapshot((snap) => {
                        const container = document.getElementById('messagesContainer');
                        const messages = [];
                        
                        snap.forEach(doc => {
                            messages.push({ id: doc.id, ...doc.data() });
                        });
                        
                        messages.sort((a, b) => {
                            const timeA = a.timestamp ? a.timestamp.toMillis() : 0;
                            const timeB = b.timestamp ? b.timestamp.toMillis() : 0;
                            return timeA - timeB;
                        });
                        
                        container.innerHTML = '';
                        messages.forEach(msg => {
                            showMessage(msg.id, msg);
                        });
                        
                        scrollToBottom();
                        
                        snap.docs.forEach(async (doc) => {
                            const data = doc.data();
                            if (data.senderId !== currentUserId && !data.read) {
                                await db.collection("messages").doc(doc.id).update({ read: true });
                            }
                        });
                    }, (error) => {
                        console.error("Private messages error:", error);
                    });

                await db.collection("inbox")
                    .where("chatId", "==", chatId)
                    .where("userId", "==", currentUserId)
                    .get()
                    .then(snap => {
                        snap.forEach(doc => {
                            doc.ref.update({ unreadCount: 0 });
                        });
                    });

            } catch (err) {
                console.error("Open private chat error:", err);
                alert("Error starting chat: " + err.message);
            }
        }

        function closeChat() {
            document.getElementById('chatScreen').classList.remove('active');
            if (messagesListener) {
                messagesListener();
                messagesListener = null;
            }
            currentChat = null;
            cancelReply();
        }

        // ============================================
        // SEND MESSAGE - FIXED FOR INBOX NOTIFICATION
        // ============================================
        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            
            if (!text) return;
            if (!currentChat) {
                alert("No chat selected");
                return;
            }

            if (currentChat.type === 'private') {
                if (blockedUsers.has(currentChat.otherUserId)) {
                    alert("You have blocked this user");
                    return;
                }
            }

            input.value = '';
            cancelReply();

            try {
                const messageData = {
                    text: text,
                    senderId: currentUserId,
                    senderName: currentUser,
                    senderAvatar: userProfileData.avatar || defaultAvatars[0].url,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                if (replyingTo) {
                    messageData.replyTo = {
                        senderName: replyingTo.username,
                        text: replyingTo.text.substring(0, 100)
                    };
                }

                if (currentChat.type === 'room') {
                    messageData.roomId = currentChat.id;
                    await db.collection("roomMessages").add(messageData);
                    
                } else {
                    messageData.chatId = currentChat.id;
                    messageData.read = false;
                    
                    await db.collection("messages").add(messageData);
                    
                    // FIXED: Update inbox for BOTH users immediately
                    await updateInboxForBothUsers(currentChat, text);
                }

            } catch (err) {
                console.error("Send error:", err);
                alert("Failed to send: " + err.message);
                input.value = text;
            }
        }

        // FIXED: Create/update inbox entries for both sender and receiver
        async function updateInboxForBothUsers(chat, text) {
            try {
                const now = firebase.firestore.FieldValue.serverTimestamp();
                
                // 1. Update/create MY inbox (sender) - no unread count for me
                const myInboxQuery = await db.collection("inbox")
                    .where("chatId", "==", chat.id)
                    .where("userId", "==", currentUserId)
                    .get();

                const myInboxData = {
                    chatId: chat.id,
                    lastMessage: text,
                    lastMessageTime: now,
                    type: 'private',
                    userId: currentUserId,
                    otherUserId: chat.otherUserId,
                    otherUsername: chat.name,
                    otherAvatar: chat.otherAvatar || defaultAvatars[0].url,
                    unreadCount: 0
                };

                if (myInboxQuery.empty) {
                    await db.collection("inbox").add(myInboxData);
                } else {
                    await myInboxQuery.docs[0].ref.update({
                        lastMessage: text,
                        lastMessageTime: now,
                        unreadCount: 0
                    });
                }

                // 2. Update/create THEIR inbox (receiver) - with unread count
                const theirInboxQuery = await db.collection("inbox")
                    .where("chatId", "==", chat.id)
                    .where("userId", "==", chat.otherUserId)
                    .get();

                const theirInboxData = {
                    chatId: chat.id,
                    lastMessage: text,
                    lastMessageTime: now,
                    type: 'private',
                    userId: chat.otherUserId,
                    otherUserId: currentUserId,
                    otherUsername: currentUser,
                    otherAvatar: userProfileData.avatar || defaultAvatars[0].url,
                    unreadCount: 1
                };

                if (theirInboxQuery.empty) {
                    await db.collection("inbox").add(theirInboxData);
                } else {
                    const currentUnread = theirInboxQuery.docs[0].data().unreadCount || 0;
                    await theirInboxQuery.docs[0].ref.update({
                        lastMessage: text,
                        lastMessageTime: now,
                        unreadCount: currentUnread + 1
                    });
                }

            } catch (err) {
                console.error("Inbox update error:", err);
            }
        }

        function showMessage(id, msg) {
            const container = document.getElementById('messagesContainer');
            const isMe = msg.senderId === currentUserId;
            const time = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
            
            if (document.getElementById(`msg-${id}`)) return;

            const div = document.createElement('div');
            div.id = `msg-${id}`;
                       div.className = 'message ' + (isMe ? 'my-message' : '');
            
            let replyHtml = '';
            if (msg.replyTo) {
                replyHtml = `
                    <div class="reply-to">
                        <span class="reply-to-name">${escapeHtml(msg.replyTo.senderName)}</span>
                        <div class="reply-to-text">${escapeHtml(msg.replyTo.text)}</div>
                    </div>
                `;
            }

            const statusHtml = isMe && currentChat && currentChat.type === 'private' ? 
                `<div class="message-status"><span class="${msg.read ? 'status-read' : ''}">${msg.read ? '✓✓ Read' : '✓ Sent'}</span></div>` : '';

            const avatarUrl = msg.senderAvatar || defaultAvatars[0].url;

            div.innerHTML = `
                <button class="reply-btn" onclick="startReply('${id}', '${escapeHtml(msg.senderName)}', '${escapeHtml(msg.text).replace(/'/g, "\\'")}')">↩️</button>
                <div class="message-header">
                    <img src="${avatarUrl}" class="user-avatar-small" onerror="this.src='${defaultAvatars[0].url}'">
                    <span class="username">${escapeHtml(msg.senderName)}</span>
                    <span class="timestamp">${time}</span>
                </div>
                ${replyHtml}
                <div class="message-bubble">${escapeHtml(msg.text)}</div>
                ${statusHtml}
            `;
            
            div.addEventListener('dblclick', () => startReply(id, msg.senderName, msg.text));
            container.appendChild(div);
        }

        function startReply(messageId, username, text) {
            replyingTo = { id: messageId, username, text };
            document.getElementById('replyPreview').style.display = 'block';
            document.getElementById('replyPreviewText').textContent = `Replying to ${username}: "${text.substring(0, 50)}${text.length > 50 ? '...' : ''}"`;
            document.getElementById('messageInput').focus();
        }

        function cancelReply() {
            replyingTo = null;
            document.getElementById('replyPreview').style.display = 'none';
        }

        function scrollToBottom() {
            const container = document.getElementById('messagesContainer');
            if (container) {
                container.scrollTop = container.scrollHeight;
            }
        }

        // ============================================
        // INBOX SYSTEM - FIXED
        // ============================================
        function listenInbox() {
            if (inboxListener) inboxListener();

            inboxListener = db.collection("inbox")
                .where("userId", "==", currentUserId)
                .onSnapshot((snap) => {
                    const list = document.getElementById('inboxList');
                    
                    if (snap.empty) {
                        list.innerHTML = `
                            <div class="empty-state">
                                <div class="empty-state-icon">💬</div>
                                <p>No conversations yet</p>
                                <p style="font-size: 14px; margin-top: 10px;">Search for users to start chatting!</p>
                            </div>
                        `;
                        return;
                    }

                    list.innerHTML = '';
                    
                    const conversations = [];
                    snap.forEach(doc => {
                        conversations.push({ id: doc.id, ...doc.data() });
                    });
                    
                    conversations.sort((a, b) => {
                        const timeA = a.lastMessageTime ? a.lastMessageTime.toMillis() : 0;
                        const timeB = b.lastMessageTime ? b.lastMessageTime.toMillis() : 0;
                        return timeB - timeA;
                    });
                    
                    conversations.forEach(data => {
                        const time = data.lastMessageTime ? 
                            new Date(data.lastMessageTime.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : '';
                        
                        const item = document.createElement('div');
                        item.className = 'chat-item' + (data.unreadCount > 0 ? ' unread' : '');
                        item.onclick = () => {
                            if (data.otherUserId && data.otherUsername) {
                                openPrivateChat(data.otherUserId, data.otherUsername, data.otherAvatar);
                            }
                        };
                        
                        item.innerHTML = `
                            <img src="${data.otherAvatar || defaultAvatars[0].url}" class="chat-avatar" onerror="this.src='${defaultAvatars[0].url}'">
                            <div class="chat-info">
                                <div class="chat-name">${escapeHtml(data.otherUsername || 'Unknown')}</div>
                                <div class="chat-preview">${escapeHtml(data.lastMessage || 'No messages yet')}</div>
                            </div>
                            <div class="chat-meta">
                                <span class="chat-time">${time}</span>
                                ${data.unreadCount > 0 ? `<span class="unread-count">${data.unreadCount}</span>` : ''}
                            </div>
                        `;
                        list.appendChild(item);
                    });
                }, (error) => {
                    console.error("Inbox error:", error);
                });
        }

        // ============================================
        // SEARCH SYSTEM - FIXED
        // ============================================
        async function handleSearch(e) {
            if (e.key !== 'Enter') return;
            
            const query = document.getElementById('searchInput').value.trim().toLowerCase();
            if (!query) return;

            const resultsDiv = document.getElementById('searchResults');
            resultsDiv.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">Searching...</p>';

            try {
                const snap = await db.collection("users").limit(100).get();

                const matchingUsers = [];
                snap.forEach(doc => {
                    const user = doc.data();
                    const username = (user.username || '').toLowerCase();
                    
                    if (username.includes(query) && user.username !== currentUser) {
                        if (!user.userId) {
                            user.userId = doc.id;
                        }
                        matchingUsers.push({ docId: doc.id, ...user });
                    }
                });

                if (matchingUsers.length === 0) {
                    resultsDiv.innerHTML = `<p style="text-align: center; color: var(--text-muted); padding: 40px;">No users found with "${escapeHtml(query)}"</p>`;
                    return;
                }

                resultsDiv.innerHTML = '';
                matchingUsers.forEach(user => {
                    const isBlocked = blockedUsers.has(user.userId);
                    
                    const div = document.createElement('div');
                    div.className = 'user-result';
                    div.innerHTML = `
                        <img src="${user.avatar || defaultAvatars[0].url}" class="user-result-avatar" onerror="this.src='${defaultAvatars[0].url}'">
                        <div class="user-result-info">
                            <div class="user-result-name">${user.flag || '🌍'} ${escapeHtml(user.username)}</div>
                            <div class="user-result-bio">${escapeHtml(user.bio || 'No bio yet')}</div>
                            <div class="user-result-country">${escapeHtml(user.country || 'Unknown')}</div>
                        </div>
                        <div class="user-result-actions">
                            ${!isBlocked ? `
                                <button class="action-btn btn-primary" onclick="openPrivateChat('${user.userId}', '${escapeHtml(user.username)}', '${user.avatar || defaultAvatars[0].url}')">
                                    💬 Message
                                </button>
                                <button class="action-btn btn-danger" onclick="blockUser('${user.userId}', '${escapeHtml(user.username)}')">
                                    🚫 Block
                                </button>
                            ` : `
                                <button class="action-btn btn-primary" disabled style="opacity: 0.5;">
                                    🚫 Blocked
                                </button>
                                <button class="action-btn" onclick="unblockUser('${user.userId}')" style="background: rgba(46, 213, 115, 0.1); color: #2ed573; border: 1px solid rgba(46, 213, 115, 0.3);">
                                    ✓ Unblock
                                </button>
                            `}
                        </div>
                    `;
                    resultsDiv.appendChild(div);
                });

            } catch (err) {
                console.error("Search error:", err);
                resultsDiv.innerHTML = `<p style="text-align: center; color: #ff4757; padding: 40px;">Error: ${err.message}</p>`;
            }
        }

        // ============================================
        // BLOCK SYSTEM
        // ============================================
        async function loadBlockedUsers() {
            if (!currentUserDocId) return;
            
            try {
                const doc = await db.collection("users").doc(currentUserDocId).get();
                if (doc.exists) {
                    const data = doc.data();
                    blockedUsers = new Set(data.blockedUsers || []);
                }
            } catch (err) {
                console.error("Load blocked error:", err);
            }
        }

        async function blockUser(userId, username) {
            if (!confirm(`Block ${username}? They won't be able to message you.`)) return;
            
            blockedUsers.add(userId);
            
            try {
                await db.collection("users").doc(currentUserDocId).update({
                    blockedUsers: Array.from(blockedUsers)
                });
                alert(`${username} blocked.`);
                
                const searchInput = document.getElementById('searchInput');
                if (searchInput.value.trim()) {
                    handleSearch({ key: 'Enter' });
                }
            } catch (err) {
                console.error("Block error:", err);
                alert("Error blocking: " + err.message);
            }
        }

        async function unblockUser(userId) {
            blockedUsers.delete(userId);
            
            try {
                await db.collection("users").doc(currentUserDocId).update({
                    blockedUsers: Array.from(blockedUsers)
                });
                alert("User unblocked.");
                
                const searchInput = document.getElementById('searchInput');
                if (searchInput.value.trim()) {
                    handleSearch({ key: 'Enter' });
                }
                
                await loadBlockedUsers();
            } catch (err) {
                console.error("Unblock error:", err);
                alert("Error unblocking: " + err.message);
            }
        }

        async function showBlockedUsers() {
            const list = document.getElementById('blockedList');
            list.innerHTML = '';

            if (blockedUsers.size === 0) {
                list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 20px;">No blocked users</p>';
            } else {
                for (const userId of blockedUsers) {
                    try {
                        const userSnap = await db.collection("users").where("userId", "==", userId).get();
                        if (!userSnap.empty) {
                            const user = userSnap.docs[0].data();
                            const div = document.createElement('div');
                            div.className = 'blocked-user';
                            div.innerHTML = `
                                <div style="display: flex; align-items: center; gap: 12px;">
                                    <img src="${user.avatar || defaultAvatars[0].url}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover;" onerror="this.src='${defaultAvatars[0].url}'">
                                    <span style="font-weight: 600; color: var(--text-dark);">${escapeHtml(user.username)}</span>
                                </div>
                                <button class="unblock-btn" onclick="unblockUser('${userId}'); showBlockedUsers();">Unblock</button>
                            `;
                            list.appendChild(div);
                        }
                    } catch (err) {
                        console.error("Error loading blocked user:", err);
                    }
                }
            }

            document.getElementById('blockedModal').classList.add('active');

        function closeBlockedModal() {
            document.getElementById('blockedModal').classList.remove('active');

        }

        function openAvatarModal() {
            const grid = document.getElementById('avatarGrid');
            grid.innerHTML = '';
            
            defaultAvatars.forEach(avatar => {
                const div = document.createElement('div');
                div.className = 'avatar-option' + (avatar.url === selectedAvatar ? ' selected' : '');
                div.innerHTML = `<img src="${avatar.url}" alt="${avatar.name}" onerror="this.src='${defaultAvatars[0].url}'">`;
                div.onclick = () => {
                    selectedAvatar = avatar.url;
                    document.querySelectorAll('.avatar-option').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    document.getElementById('profilePicLarge').src = avatar.url;
                };
                grid.appendChild(div);
            });
            
            document.getElementById('avatarModal').classList.add('active');
        }

        function closeAvatarModal() {
            document.getElementById('avatarModal').classList.remove('active');
        }

        async function saveProfile() {
            const btn = document.querySelector('.save-profile-btn');
            const newUsername = document.getElementById('profileUsername').value.trim();
            const newBio = document.getElementById('profileBio').value.trim();
            
            if (!newUsername) {
                alert("Username cannot be empty!");
                return;
            }

            const usernameChanged = newUsername !== currentUser;
            const bioChanged = newBio !== (userProfileData.bio || '');
            const avatarChanged = selectedAvatar !== userProfileData.avatar;

            if (!usernameChanged && !bioChanged && !avatarChanged) {
                alert("No changes made!");
                closeProfile();
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Saving...';

            try {
                if (usernameChanged) {
                    const existing = await db.collection("users")
                        .where("username", "==", newUsername)
                        .get();
                    
                    let taken = false;
                    existing.forEach(doc => {
                        if (doc.id !== currentUserDocId) taken = true;
                    });

                    if (taken) {
                        alert("Username already taken!");
                        btn.disabled = false;
                        btn.textContent = '💾 Save Changes';
                        return;
                    }
                }

                const updateData = {};
                if (usernameChanged) updateData.username = newUsername;
                if (bioChanged) updateData.bio = newBio;
                if (avatarChanged) updateData.avatar = selectedAvatar;

                await db.collection("users").doc(currentUserDocId).update(updateData);

                if (usernameChanged || avatarChanged) {
                    const batch = db.batch();
                    
                    const roomMsgs = await db.collection("roomMessages")
                        .where("senderId", "==", currentUserId)
                        .limit(500)
                        .get();
                    
                    roomMsgs.forEach(doc => {
                        const upd = {};
                        if (usernameChanged) upd.senderName = newUsername;
                        if (avatarChanged) upd.senderAvatar = selectedAvatar;
                        batch.update(doc.ref, upd);
                    });

                    const privMsgs = await db.collection("messages")
                        .where("senderId", "==", currentUserId)
                        .limit(500)
                        .get();
                    
                    privMsgs.forEach(doc => {
                        const upd = {};
                        if (usernameChanged) upd.senderName = newUsername;
                        if (avatarChanged) upd.senderAvatar = selectedAvatar;
                        batch.update(doc.ref, upd);
                    });

                    await batch.commit();
                }

                currentUser = newUsername;
                userProfileData = {
                    username: newUsername,
                    bio: newBio,
                    avatar: selectedAvatar,
                    country: currentCountry
                };

                btn.disabled = false;
                btn.textContent = '💾 Save Changes';
                alert("Profile updated!");
                closeProfile();
                closeAvatarModal();

            } catch (err) {
                console.error("Save profile error:", err);
                alert("Error: " + err.message);
                btn.disabled = false;
                btn.textContent = '💾 Save Changes';
            }
        }

        // ============================================
        // UTILITIES
        // ============================================
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('loginUsername').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginPassword').focus();
        });
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') loginUser();
        });
        document.getElementById('regUsername').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('regPassword').focus();
        });
        document.getElementById('regPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') registerUser();
        });
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        window.onclick = function(e) {
            if (e.target.id === 'avatarModal') closeAvatarModal();
            if (e.target.id === 'blockedModal') closeBlockedModal();
        }

        // Mobile viewport height fix
        function setViewportHeight() {
            let vh = window.innerHeight * 0.01;
            document.documentElement.style.setProperty('--vh', `${vh}px`);
        }

        window.addEventListener('resize', setViewportHeight);
        window.addEventListener('orientationchange', setViewportHeight);
        setViewportHeight();

        console.log("✅ Mubble Chat App Loaded - Mobile Optimized Version");
    </script>
</body>
</html>
